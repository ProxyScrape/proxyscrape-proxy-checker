name: Update GeoIP Database

# Runs weekly to keep the GeoIP database fresh on R2, independent of app
# releases.  Can also be triggered manually via the Actions UI.
on:
  schedule:
    - cron: '0 3 * * 1'   # every Monday at 03:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'Force upload even if checksum matches'
        required: false
        default: 'false'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  R2_BUCKET: ${{ secrets.R2_BUCKET }}
  R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}

jobs:
  update-geoip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install mmdbctl
        run: |
          curl -sL "https://github.com/ipinfo/mmdbctl/releases/download/mmdbctl-1.4.10/mmdbctl_1.4.10_linux_amd64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP"
          mv "$RUNNER_TEMP/mmdbctl_1.4.10_linux_amd64" "$RUNNER_TEMP/mmdbctl"
          chmod +x "$RUNNER_TEMP/mmdbctl"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Build geoip.mmdb
        env:
          GEOFEED_URL: ${{ secrets.GEOFEED_URL }}
          MMDB_OUT: geoip.mmdb
        run: python3 scripts/build-geoip-db.py

      - name: Compute SHA-256 checksum
        run: sha256sum geoip.mmdb | awk '{print $1}' > checksum.txt

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          LOCAL_CHECKSUM=$(cat checksum.txt)
          FORCE="${{ github.event.inputs.force }}"

          # Skip upload if remote already has the same build (unless forced).
          REMOTE_CHECKSUM=$(aws s3 cp "s3://$R2_BUCKET/mmdb/checksum.txt" - \
            --endpoint-url "$R2_ENDPOINT" 2>/dev/null || true)

          if [ "$LOCAL_CHECKSUM" = "$REMOTE_CHECKSUM" ] && [ "$FORCE" != "true" ]; then
            echo "GeoIP database is already up-to-date — skipping upload."
            exit 0
          fi

          echo "Uploading geoip.mmdb (checksum: $LOCAL_CHECKSUM)…"

          # Upload the MMDB first so clients always have a valid file, then
          # atomically flip the checksum so Electron knows to re-download.
          aws s3 cp geoip.mmdb "s3://$R2_BUCKET/mmdb/geoip.mmdb" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "application/octet-stream" \
            --cache-control "public, max-age=86400" \
            --no-progress

          echo -n "$LOCAL_CHECKSUM" | aws s3 cp - "s3://$R2_BUCKET/mmdb/checksum.txt" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "text/plain" \
            --cache-control "no-cache, max-age=0" \
            --no-progress

          echo "Done — geoip.mmdb updated on R2."
