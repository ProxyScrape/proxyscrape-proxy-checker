name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Derived from the pushed tag (e.g. v2.0.0-canary or v2.0.0).
  # Used to inject appVersion into Go binaries.
  APP_VERSION: ${{ github.ref_name }}
  # R2 upload configuration.
  R2_BUCKET: ${{ secrets.R2_BUCKET }}
  R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}

jobs:
  # ── Version consistency gate ──────────────────────────────────────────────────
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check version consistency
        run: bash scripts/check-versions.sh "${{ github.ref_name }}"

  # ── JS bundle: built once, shared across all platform release jobs ────────────
  build-renderer:
    needs: [check-versions]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer bundle
        run: npx electron-vite build
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_API_HOST: ${{ secrets.POSTHOG_API_HOST }}
          POSTHOG_UI_HOST: ${{ secrets.POSTHOG_UI_HOST }}
          INTERCOM_APP_ID: ${{ secrets.INTERCOM_APP_ID }}

      - uses: actions/upload-artifact@v6
        with:
          name: renderer-dist
          path: dist/

  # ── Go binaries: Windows (cross-compiled from Linux with zig cc) ─────────────
  build-go-windows:
    needs: [check-versions]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install Zig
        run: |
          ZIG_VERSION="0.15.2"
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" \
            | tar -xJ -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Build win-x64
        run: |
          GOOS=windows GOARCH=amd64 CGO_ENABLED=1 \
            CC="zig cc -target x86_64-windows-gnu" \
            go build -C backend -buildvcs=false \
            -ldflags="-s -w -X 'github.com/proxyscrape/checker-backend/internal/api.appVersion=${APP_VERSION#v}'" \
            -o ../bin/checker-win-x64.exe ./cmd/checker

      - name: Build win-arm64
        run: |
          GOOS=windows GOARCH=arm64 CGO_ENABLED=1 \
            CC="zig cc -target aarch64-windows-gnu" \
            go build -C backend -buildvcs=false \
            -ldflags="-s -w -X 'github.com/proxyscrape/checker-backend/internal/api.appVersion=${APP_VERSION#v}'" \
            -o ../bin/checker-win-arm64.exe ./cmd/checker

      - uses: actions/upload-artifact@v6
        with:
          name: go-win-bins
          path: bin/

  # ── Go binaries: Linux (x64 native, arm64 via GCC cross-compiler) ───────────
  build-go-linux:
    needs: [check-versions]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install libpcap headers + arm64 cross-compiler
        run: |
          sudo dpkg --add-architecture arm64

          sudo tee /etc/apt/sources.list.d/ubuntu.sources > /dev/null << 'EOF'
          Types: deb
          URIs: http://azure.archive.ubuntu.com/ubuntu/
          Suites: noble noble-updates noble-backports
          Components: main restricted universe multiverse
          Architectures: amd64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg

          Types: deb
          URIs: http://security.ubuntu.com/ubuntu/
          Suites: noble-security
          Components: main restricted universe multiverse
          Architectures: amd64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg

          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports/
          Suites: noble noble-updates noble-backports noble-security
          Components: main restricted universe multiverse
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF

          sudo apt-get update -qq
          sudo apt-get install -y libpcap-dev libpcap-dev:arm64 gcc-aarch64-linux-gnu

      - name: Build linux-x64
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -C backend -buildvcs=false \
            -ldflags="-s -w -X 'github.com/proxyscrape/checker-backend/internal/api.appVersion=${APP_VERSION#v}'" \
            -o ../bin/checker-linux-x64 ./cmd/checker

      - name: Build linux-arm64 (aarch64-linux-gnu-gcc cross-compile)
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 \
            CC=aarch64-linux-gnu-gcc \
            CGO_LDFLAGS="-L/usr/lib/aarch64-linux-gnu" \
            go build -C backend -buildvcs=false \
            -ldflags="-s -w -X 'github.com/proxyscrape/checker-backend/internal/api.appVersion=${APP_VERSION#v}'" \
            -o ../bin/checker-linux-arm64 ./cmd/checker

      - uses: actions/upload-artifact@v6
        with:
          name: go-linux-bins
          path: bin/

  # ── Go binaries: macOS ───────────────────────────────────────────────────────
  build-go-macos:
    needs: [check-versions]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Build darwin-arm64
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
            go build -C backend -buildvcs=false \
            -ldflags="-s -w -X 'github.com/proxyscrape/checker-backend/internal/api.appVersion=${APP_VERSION#v}'" \
            -o ../bin/checker-darwin-arm64 ./cmd/checker

      - name: Build darwin-x64
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 \
            go build -C backend -buildvcs=false \
            -ldflags="-s -w -X 'github.com/proxyscrape/checker-backend/internal/api.appVersion=${APP_VERSION#v}'" \
            -o ../bin/checker-darwin-x64 ./cmd/checker

      - uses: actions/upload-artifact@v6
        with:
          name: go-macos-bins
          path: bin/

  # ── Electron: Windows installer + portable ──────────────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: [build-renderer, build-go-windows]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron binary
        uses: actions/cache@v5
        with:
          path: ${{ env.LOCALAPPDATA }}\electron\Cache
          key: electron-win-${{ hashFiles('package.json') }}

      - uses: actions/download-artifact@v7
        with:
          name: renderer-dist
          path: dist

      - uses: actions/download-artifact@v7
        with:
          name: go-win-bins
          path: bin

      - name: Install dependencies
        run: npm ci

      - name: Build Windows (no publish)
        run: npx electron-builder --config electron-builder.config.js --win --publish never
        env:
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_API_HOST: ${{ secrets.POSTHOG_API_HOST }}
          POSTHOG_UI_HOST: ${{ secrets.POSTHOG_UI_HOST }}
          INTERCOM_APP_ID: ${{ secrets.INTERCOM_APP_ID }}

      - uses: actions/upload-artifact@v6
        with:
          name: release-win
          path: release/

  # ── Electron: Linux AppImage ─────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    needs: [build-renderer, build-go-linux]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/electron
          key: electron-linux-${{ hashFiles('package.json') }}

      - uses: actions/download-artifact@v7
        with:
          name: renderer-dist
          path: dist

      - uses: actions/download-artifact@v7
        with:
          name: go-linux-bins
          path: bin

      - name: Make Linux binaries executable
        run: chmod +x bin/checker-linux-*

      - name: Install dependencies
        run: npm ci

      - name: Build Linux (no publish)
        run: npx electron-builder --config electron-builder.config.js --linux --publish never
        env:
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_API_HOST: ${{ secrets.POSTHOG_API_HOST }}
          POSTHOG_UI_HOST: ${{ secrets.POSTHOG_UI_HOST }}
          INTERCOM_APP_ID: ${{ secrets.INTERCOM_APP_ID }}

      - uses: actions/upload-artifact@v6
        with:
          name: release-linux
          path: release/

  # ── Electron: macOS DMG + zip ────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    needs: [build-renderer, build-go-macos]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron binary
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/electron
          key: electron-macos-${{ hashFiles('package.json') }}

      - uses: actions/download-artifact@v7
        with:
          name: renderer-dist
          path: dist

      - uses: actions/download-artifact@v7
        with:
          name: go-macos-bins
          path: bin

      - name: Make macOS binaries executable
        run: chmod +x bin/checker-darwin-*

      - name: Install dependencies
        run: npm ci

      - name: Build macOS (no publish)
        run: npx electron-builder --config electron-builder.config.js --mac --publish never
        env:
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_API_HOST: ${{ secrets.POSTHOG_API_HOST }}
          POSTHOG_UI_HOST: ${{ secrets.POSTHOG_UI_HOST }}
          INTERCOM_APP_ID: ${{ secrets.INTERCOM_APP_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v6
        with:
          name: release-macos
          path: release/

  # ── Publish: upload to R2 + create GitHub Release ────────────────────────────
  # Runs after all three platform builds complete. Uploads binaries and update
  # metadata (.yml files) to Cloudflare R2, then creates a GitHub Release
  # containing only the changelog (no binary assets attached).
  publish:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-macos]
    steps:
      - uses: actions/checkout@v5

      - name: Detect channel
        id: channel
        run: |
          if [[ "${{ github.ref_name }}" == *"-canary"* ]]; then
            echo "path=canary" >> $GITHUB_OUTPUT
          else
            echo "path=stable" >> $GITHUB_OUTPUT
          fi

      - name: Download all platform artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: release-all/
          merge-multiple: true

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          CHANNEL=${{ steps.channel.outputs.path }}

          # Upload binaries (cached by filename — content-addressed by version in name)
          aws s3 sync release-all/ s3://${{ env.R2_BUCKET }}/$CHANNEL/ \
            --endpoint-url "${{ env.R2_ENDPOINT }}" \
            --exclude "*.yml" \
            --exclude "*.yaml" \
            --no-progress

          # Upload .yml metadata files with no-cache so clients always get the
          # latest version info and never serve a stale "up to date" response.
          for yml in release-all/*.yml; do
            [ -f "$yml" ] || continue
            aws s3 cp "$yml" s3://${{ env.R2_BUCKET }}/$CHANNEL/$(basename "$yml") \
              --endpoint-url "${{ env.R2_ENDPOINT }}" \
              --content-type "text/yaml" \
              --cache-control "no-cache, max-age=0" \
              --no-progress
          done

      # TRANSITIONAL: This step lets v1.x.x users auto-update to v2 via their
      # existing GitHub provider. Their installed app checks GitHub Release assets
      # for latest.yml — without this, they would never see v2.
      #
      # HOW TO USE: Change `if: false` to `if: true` when tagging the FIRST v2
      # stable release (no -canary suffix), then revert it once that release has
      # been live for ~2 weeks and most v1 users have updated.
      - name: Upload to GitHub Release assets (v1 backwards compat — transitional)
        if: false
        run: |
          gh release upload ${{ github.ref_name }} release-all/* --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (changelog only)
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            ${{ contains(github.ref_name, '-canary') && '--prerelease' || '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
