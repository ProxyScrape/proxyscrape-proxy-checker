name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Derived from the pushed tag (e.g. v2.0.0-canary or v2.0.0).
  # Used to inject appVersion into Go binaries.
  APP_VERSION: ${{ github.ref_name }}
  # R2 configuration — stored as secrets so forks can't accidentally write to
  # or rely on ProxyScrape's bucket.
  R2_BUCKET: ${{ secrets.R2_BUCKET }}
  R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}

jobs:
  # ── Version consistency gate ──────────────────────────────────────────────────
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check version consistency
        run: bash scripts/check-versions.sh "${{ github.ref_name }}"

  # ── JS bundle: built once, shared across all platform release jobs ────────────
  build-renderer:
    needs: [check-versions]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer bundle
        run: npx electron-vite build
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_API_HOST: ${{ secrets.POSTHOG_API_HOST }}
          POSTHOG_UI_HOST: ${{ secrets.POSTHOG_UI_HOST }}
          INTERCOM_APP_ID: ${{ secrets.INTERCOM_APP_ID }}

      - uses: actions/upload-artifact@v6
        with:
          name: renderer-dist
          path: dist/

  # ── Go binaries: Windows (cross-compiled from Linux with zig cc) ─────────────
  build-go-windows:
    needs: [check-versions]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install Zig
        run: |
          ZIG_VERSION="0.15.2"
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" \
            | tar -xJ -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Build win-x64
        run: |
          GOOS=windows GOARCH=amd64 CGO_ENABLED=1 \
            CC="zig cc -target x86_64-windows-gnu" \
            go build -C backend -buildvcs=false \
            -ldflags="-s -w -X 'github.com/proxyscrape/checker-backend/internal/api.appVersion=${APP_VERSION#v}'" \
            -o ../bin/checker-win-x64.exe ./cmd/checker

      - name: Build win-arm64
        run: |
          GOOS=windows GOARCH=arm64 CGO_ENABLED=1 \
            CC="zig cc -target aarch64-windows-gnu" \
            go build -C backend -buildvcs=false \
            -ldflags="-s -w -X 'github.com/proxyscrape/checker-backend/internal/api.appVersion=${APP_VERSION#v}'" \
            -o ../bin/checker-win-arm64.exe ./cmd/checker

      - uses: actions/upload-artifact@v6
        with:
          name: go-win-bins
          path: bin/

  # ── Go binaries: Linux (x64 native, arm64 via GCC cross-compiler) ───────────
  build-go-linux:
    needs: [check-versions]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install libpcap headers + arm64 cross-compiler
        run: |
          sudo dpkg --add-architecture arm64

          sudo tee /etc/apt/sources.list.d/ubuntu.sources > /dev/null << 'EOF'
          Types: deb
          URIs: http://azure.archive.ubuntu.com/ubuntu/
          Suites: noble noble-updates noble-backports
          Components: main restricted universe multiverse
          Architectures: amd64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg

          Types: deb
          URIs: http://security.ubuntu.com/ubuntu/
          Suites: noble-security
          Components: main restricted universe multiverse
          Architectures: amd64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg

          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports/
          Suites: noble noble-updates noble-backports noble-security
          Components: main restricted universe multiverse
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF

          sudo apt-get update -qq
          sudo apt-get install -y libpcap-dev libpcap-dev:arm64 gcc-aarch64-linux-gnu

      - name: Build linux-x64
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -C backend -buildvcs=false \
            -ldflags="-s -w -X 'github.com/proxyscrape/checker-backend/internal/api.appVersion=${APP_VERSION#v}'" \
            -o ../bin/checker-linux-x64 ./cmd/checker

      - name: Build linux-arm64 (aarch64-linux-gnu-gcc cross-compile)
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 \
            CC=aarch64-linux-gnu-gcc \
            CGO_LDFLAGS="-L/usr/lib/aarch64-linux-gnu" \
            go build -C backend -buildvcs=false \
            -ldflags="-s -w -X 'github.com/proxyscrape/checker-backend/internal/api.appVersion=${APP_VERSION#v}'" \
            -o ../bin/checker-linux-arm64 ./cmd/checker

      - uses: actions/upload-artifact@v6
        with:
          name: go-linux-bins
          path: bin/

  # ── Go binaries: macOS ───────────────────────────────────────────────────────
  build-go-macos:
    needs: [check-versions]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Build darwin-arm64
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
            go build -C backend -buildvcs=false \
            -ldflags="-s -w -X 'github.com/proxyscrape/checker-backend/internal/api.appVersion=${APP_VERSION#v}'" \
            -o ../bin/checker-darwin-arm64 ./cmd/checker

      - name: Build darwin-x64
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 \
            go build -C backend -buildvcs=false \
            -ldflags="-s -w -X 'github.com/proxyscrape/checker-backend/internal/api.appVersion=${APP_VERSION#v}'" \
            -o ../bin/checker-darwin-x64 ./cmd/checker

      - uses: actions/upload-artifact@v6
        with:
          name: go-macos-bins
          path: bin/

  # ── Electron: Windows installer + portable ──────────────────────────────────
  # Builds, uploads binaries directly to R2, then saves only the .yml metadata
  # as an artifact for the publish job to upload last (after binaries are live).
  build-windows:
    runs-on: windows-latest
    needs: [build-renderer, build-go-windows]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron binary
        uses: actions/cache@v5
        with:
          path: ${{ env.LOCALAPPDATA }}\electron\Cache
          key: electron-win-${{ hashFiles('package.json') }}

      - uses: actions/download-artifact@v7
        with:
          name: renderer-dist
          path: dist

      - uses: actions/download-artifact@v7
        with:
          name: go-win-bins
          path: bin

      - name: Install dependencies
        run: npm ci

      - name: Build Windows (no publish)
        run: npx electron-builder --config electron-builder.config.js --win --publish never
        env:
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_API_HOST: ${{ secrets.POSTHOG_API_HOST }}
          POSTHOG_UI_HOST: ${{ secrets.POSTHOG_UI_HOST }}
          INTERCOM_APP_ID: ${{ secrets.INTERCOM_APP_ID }}

      - name: Install s5cmd
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/s5cmd-bin"
          curl -sL "https://github.com/peak/s5cmd/releases/download/v2.2.2/s5cmd_2.2.2_Windows-64bit.zip" \
            -o "$RUNNER_TEMP/s5cmd.zip"
          unzip -q "$RUNNER_TEMP/s5cmd.zip" -d "$RUNNER_TEMP/s5cmd-bin"
          echo "$RUNNER_TEMP/s5cmd-bin" >> "$GITHUB_PATH"

      - name: Upload Windows binaries to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          [[ "${{ github.ref_name }}" == *"-canary"* ]] && CHANNEL=canary || CHANNEL=stable

          # Upload all binary and blockmap files in parallel (immutable — versioned filenames never change)
          s5cmd --endpoint-url "$R2_ENDPOINT" --numworkers 10 \
            cp --concurrency 8 \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/octet-stream" \
            "release/*.exe" "s3://$R2_BUCKET/$CHANNEL/" &

          s5cmd --endpoint-url "$R2_ENDPOINT" --numworkers 10 \
            cp --concurrency 8 \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/octet-stream" \
            "release/*.blockmap" "s3://$R2_BUCKET/$CHANNEL/" &

          wait

      # Only yml files are passed to the publish job — binaries are already on R2.
      - uses: actions/upload-artifact@v6
        with:
          name: win-yml
          path: release/*.yml

  # ── Electron: Linux AppImage ─────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    needs: [build-renderer, build-go-linux]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/electron
          key: electron-linux-${{ hashFiles('package.json') }}

      - uses: actions/download-artifact@v7
        with:
          name: renderer-dist
          path: dist

      - uses: actions/download-artifact@v7
        with:
          name: go-linux-bins
          path: bin

      - name: Make Linux binaries executable
        run: chmod +x bin/checker-linux-*

      - name: Install dependencies
        run: npm ci

      - name: Build Linux (no publish)
        run: npx electron-builder --config electron-builder.config.js --linux --publish never
        env:
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_API_HOST: ${{ secrets.POSTHOG_API_HOST }}
          POSTHOG_UI_HOST: ${{ secrets.POSTHOG_UI_HOST }}
          INTERCOM_APP_ID: ${{ secrets.INTERCOM_APP_ID }}

      - name: Install s5cmd
        run: |
          mkdir -p "$RUNNER_TEMP/s5cmd-bin"
          curl -sL "https://github.com/peak/s5cmd/releases/download/v2.2.2/s5cmd_2.2.2_Linux-64bit.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP/s5cmd-bin" s5cmd
          echo "$RUNNER_TEMP/s5cmd-bin" >> "$GITHUB_PATH"

      - name: Upload Linux binaries to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          [[ "${{ github.ref_name }}" == *"-canary"* ]] && CHANNEL=canary || CHANNEL=stable

          s5cmd --endpoint-url "$R2_ENDPOINT" --numworkers 10 \
            cp --concurrency 8 \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/octet-stream" \
            "release/*.AppImage" "s3://$R2_BUCKET/$CHANNEL/" &

          s5cmd --endpoint-url "$R2_ENDPOINT" --numworkers 10 \
            cp --concurrency 8 \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/octet-stream" \
            "release/*.blockmap" "s3://$R2_BUCKET/$CHANNEL/" &

          wait

      - uses: actions/upload-artifact@v6
        with:
          name: linux-yml
          path: release/*.yml

  # ── Electron: macOS DMG + zip ────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    needs: [build-renderer, build-go-macos]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron binary
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/electron
          key: electron-macos-${{ hashFiles('package.json') }}

      - uses: actions/download-artifact@v7
        with:
          name: renderer-dist
          path: dist

      - uses: actions/download-artifact@v7
        with:
          name: go-macos-bins
          path: bin

      - name: Make macOS binaries executable
        run: chmod +x bin/checker-darwin-*

      - name: Install dependencies
        run: npm ci

      - name: Build macOS (no publish)
        run: npx electron-builder --config electron-builder.config.js --mac --publish never
        env:
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_API_HOST: ${{ secrets.POSTHOG_API_HOST }}
          POSTHOG_UI_HOST: ${{ secrets.POSTHOG_UI_HOST }}
          INTERCOM_APP_ID: ${{ secrets.INTERCOM_APP_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Install s5cmd
        run: |
          mkdir -p "$RUNNER_TEMP/s5cmd-bin"
          ARCH="${{ runner.arch }}"
          [[ "$ARCH" == "ARM64" ]] && S5_ARCH="macOS-arm64" || S5_ARCH="macOS-64bit"
          curl -sL "https://github.com/peak/s5cmd/releases/download/v2.2.2/s5cmd_2.2.2_${S5_ARCH}.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP/s5cmd-bin" s5cmd
          echo "$RUNNER_TEMP/s5cmd-bin" >> "$GITHUB_PATH"

      - name: Upload macOS binaries to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          [[ "${{ github.ref_name }}" == *"-canary"* ]] && CHANNEL=canary || CHANNEL=stable

          s5cmd --endpoint-url "$R2_ENDPOINT" --numworkers 10 \
            cp --concurrency 8 \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/x-apple-diskimage" \
            "release/*.dmg" "s3://$R2_BUCKET/$CHANNEL/" &

          s5cmd --endpoint-url "$R2_ENDPOINT" --numworkers 10 \
            cp --concurrency 8 \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/zip" \
            "release/*.zip" "s3://$R2_BUCKET/$CHANNEL/" &

          s5cmd --endpoint-url "$R2_ENDPOINT" --numworkers 10 \
            cp --concurrency 8 \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/octet-stream" \
            "release/*.blockmap" "s3://$R2_BUCKET/$CHANNEL/" &

          wait

      - uses: actions/upload-artifact@v6
        with:
          name: macos-yml
          path: release/*.yml

  # ── Publish: upload .yml metadata to R2 + create GitHub Release ──────────────
  # Binaries are already on R2 (uploaded in parallel by each platform job above).
  # YML metadata files are uploaded LAST so electron-updater never fetches a
  # latest.yml that references a binary not yet live.
  #
  # Concurrency group ensures that if two tags land close together, the
  # releases.json read-modify-write is serialised (never races).
  publish:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-macos]
    concurrency:
      group: releases-json-update
      cancel-in-progress: false
    steps:
      # fetch-depth: 0 — full history + all tags needed for `git log` in
      # generate-release-notes.mjs to find commits between this tag and the last.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect channel
        id: channel
        run: |
          if [[ "${{ github.ref_name }}" == *"-canary"* ]]; then
            echo "path=canary" >> $GITHUB_OUTPUT
          else
            echo "path=stable" >> $GITHUB_OUTPUT
          fi

      - name: Download all yml artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: '*-yml'
          path: ymls/
          merge-multiple: true

      - name: Tune AWS CLI for R2 uploads
        run: |
          mkdir -p ~/.aws
          cat >> ~/.aws/config << 'EOF'
          [default]
          s3 =
            multipart_threshold = 64MB
            multipart_chunksize = 64MB
            max_concurrent_requests = 20
            max_queue_size = 10000
          EOF

      - name: Upload yml metadata to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          CHANNEL=${{ steps.channel.outputs.path }}

          for yml in ymls/*.yml; do
            [ -f "$yml" ] || continue
            aws s3 cp "$yml" "s3://$R2_BUCKET/$CHANNEL/$(basename "$yml")" \
              --endpoint-url "$R2_ENDPOINT" \
              --content-type "text/yaml" \
              --cache-control "no-cache, max-age=0" \
              --no-progress
          done

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      # Download the current releases.json from R2 so we can prepend the new
      # entry.  Fall back to an empty array if this is the very first release.
      - name: Download current releases.json from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp "s3://$R2_BUCKET/releases.json" releases.json \
            --endpoint-url "$R2_ENDPOINT" \
            --no-progress 2>/dev/null || echo '[]' > releases.json

      # AI generates notes from git commits between this tag and the previous
      # same-channel tag.  If a human already added an entry for this version
      # to releases.json before CI ran, the script exits without calling the AI.
      - name: Generate release notes (AI from commits)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          node scripts/generate-release-notes.mjs \
            --tag="${{ github.ref_name }}" \
            --input=releases.json \
            --output=releases.json

      - name: Upload releases.json to R2 (no-cache — always fetch latest)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp releases.json "s3://$R2_BUCKET/releases.json" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "application/json" \
            --cache-control "no-cache, max-age=0" \
            --no-progress

      # TRANSITIONAL: This step lets v1.x.x users auto-update to v2 via their
      # existing GitHub provider. Their installed app checks GitHub Release assets
      # for latest.yml — without this, they would never see v2 exist.
      #
      # HOW TO USE: Change `if: false` to `if: true` when tagging the FIRST v2
      # stable release (no -canary suffix), then revert to `if: false` once that
      # release has been live for ~2 weeks and most v1 users have updated.
      - name: Create GitHub Release + upload assets (v1 backwards compat — transitional)
        if: false
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_BARE="${VERSION#v}"

          # Extract notes from the releases.json we just updated
          NOTES=$(node -e "
            const r = JSON.parse(require('fs').readFileSync('releases.json','utf-8'));
            const entry = r.find(x => x.version === '$VERSION_BARE');
            process.stdout.write(entry ? entry.notes : '_See in-app changelog._');
          " 2>/dev/null || echo "_See in-app changelog._")
          printf '%s' "$NOTES" > /tmp/release-notes.md

          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.md

          # Attach binaries so v1 electron-updater can find latest.yml
          mkdir -p release-all
          gh run download --name release-win --dir release-all/ 2>/dev/null || true
          gh run download --name release-linux --dir release-all/ 2>/dev/null || true
          gh run download --name release-macos --dir release-all/ 2>/dev/null || true
          cp ymls/*.yml release-all/ 2>/dev/null || true
          gh release upload "${{ github.ref_name }}" release-all/* --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
