name: Release Canary

on:
  push:
    tags:
      - 'v*-canary'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── JS bundle: built once, shared across all platform release jobs ────────────
  build-renderer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer bundle
        run: npx electron-vite build --outDir dist
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_API_HOST: ${{ secrets.POSTHOG_API_HOST }}
          POSTHOG_UI_HOST: ${{ secrets.POSTHOG_UI_HOST }}
          INTERCOM_APP_ID: ${{ secrets.INTERCOM_APP_ID }}

      - uses: actions/upload-artifact@v4
        with:
          name: renderer-dist
          path: dist/

  # ── Go binaries: Windows (cross-compiled from Linux with zig cc) ─────────────
  build-go-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - uses: mlugg/setup-zig@v2

      - name: Build win-x64
        run: |
          GOOS=windows GOARCH=amd64 CGO_ENABLED=1 \
            CC="zig cc -target x86_64-windows-gnu" \
            go build -C backend -buildvcs=false -ldflags="-s -w" \
            -o ../bin/checker-win-x64.exe ./cmd/checker

      - name: Build win-arm64
        run: |
          GOOS=windows GOARCH=arm64 CGO_ENABLED=1 \
            CC="zig cc -target aarch64-windows-gnu" \
            go build -C backend -buildvcs=false -ldflags="-s -w" \
            -o ../bin/checker-win-arm64.exe ./cmd/checker

      - uses: actions/upload-artifact@v4
        with:
          name: go-win-bins
          path: bin/

  # ── Go binaries: Linux (x64 native, arm64 via zig cc cross-compile) ──────────
  build-go-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - uses: mlugg/setup-zig@v2

      - name: Install libpcap headers (x64 + arm64)
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64,i386] /g' /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs) main universe" \
            | sudo tee -a /etc/apt/sources.list
          sudo apt-get update -qq
          sudo apt-get install -y libpcap-dev libpcap-dev:arm64

      - name: Build linux-x64
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -C backend -buildvcs=false -ldflags="-s -w" \
            -o ../bin/checker-linux-x64 ./cmd/checker

      - name: Build linux-arm64 (zig cc cross-compile, no Docker/QEMU)
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 \
            CC="zig cc -target aarch64-linux-gnu" \
            CGO_CFLAGS="-I/usr/include" \
            CGO_LDFLAGS="-L/usr/lib/aarch64-linux-gnu" \
            go build -C backend -buildvcs=false -ldflags="-s -w" \
            -o ../bin/checker-linux-arm64 ./cmd/checker

      - uses: actions/upload-artifact@v4
        with:
          name: go-linux-bins
          path: bin/

  # ── Go binaries: macOS ───────────────────────────────────────────────────────
  build-go-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Build darwin-arm64
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
            go build -C backend -buildvcs=false -ldflags="-s -w" \
            -o ../bin/checker-darwin-arm64 ./cmd/checker

      - name: Build darwin-x64
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 \
            go build -C backend -buildvcs=false -ldflags="-s -w" \
            -o ../bin/checker-darwin-x64 ./cmd/checker

      - uses: actions/upload-artifact@v4
        with:
          name: go-macos-bins
          path: bin/

  # ── Electron: Windows installer + portable ──────────────────────────────────
  release-windows:
    runs-on: windows-latest
    needs: [build-renderer, build-go-windows]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ${{ env.LOCALAPPDATA }}\electron\Cache
          key: electron-win-${{ hashFiles('package.json') }}

      - uses: actions/download-artifact@v4
        with:
          name: renderer-dist
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: go-win-bins
          path: bin

      - name: Install dependencies
        run: npm ci

      - name: Package & publish Windows (pre-release)
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_PRE_RELEASE: true
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_API_HOST: ${{ secrets.POSTHOG_API_HOST }}
          POSTHOG_UI_HOST: ${{ secrets.POSTHOG_UI_HOST }}
          INTERCOM_APP_ID: ${{ secrets.INTERCOM_APP_ID }}

  # ── Electron: Linux AppImage ─────────────────────────────────────────────────
  release-linux:
    runs-on: ubuntu-latest
    needs: [build-renderer, build-go-linux]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-linux-${{ hashFiles('package.json') }}

      - uses: actions/download-artifact@v4
        with:
          name: renderer-dist
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: go-linux-bins
          path: bin

      - name: Make Linux binaries executable
        run: chmod +x bin/checker-linux-*

      - name: Install dependencies
        run: npm ci

      - name: Package & publish Linux (pre-release)
        run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_PRE_RELEASE: true
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_API_HOST: ${{ secrets.POSTHOG_API_HOST }}
          POSTHOG_UI_HOST: ${{ secrets.POSTHOG_UI_HOST }}
          INTERCOM_APP_ID: ${{ secrets.INTERCOM_APP_ID }}

  # ── Electron: macOS DMG + zip ────────────────────────────────────────────────
  release-macos:
    runs-on: macos-latest
    needs: [build-renderer, build-go-macos]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: electron-macos-${{ hashFiles('package.json') }}

      - uses: actions/download-artifact@v4
        with:
          name: renderer-dist
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: go-macos-bins
          path: bin

      - name: Make macOS binaries executable
        run: chmod +x bin/checker-darwin-*

      - name: Install dependencies
        run: npm ci

      - name: Package & publish macOS (pre-release, unsigned)
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_PRE_RELEASE: true
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_API_HOST: ${{ secrets.POSTHOG_API_HOST }}
          POSTHOG_UI_HOST: ${{ secrets.POSTHOG_UI_HOST }}
          INTERCOM_APP_ID: ${{ secrets.INTERCOM_APP_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
